<svg fill="none" width="600" height="100" viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          display: flex;
          justify-content: center;
          gap: 25px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          background: transparent;
          padding: 20px;
        }

        .btn {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 12px 28px;
          color: #ffffff;
          text-decoration: none;
          font-size: 15px;
          font-weight: 600;
          border-radius: 12px;
          background: #161b22;
          border: 1px solid #30363d;
          overflow: hidden;
          transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Der coole Glow-Effekt */
        .btn::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(
            90deg,
            transparent,
            rgba(255, 255, 255, 0.1),
            transparent
          );
          transition: 0.5s;
        }

        /* Hover-Effekte für die einzelnen Buttons */
        .btn-portfolio:hover {
          color: #00fff0;
          border-color: #00fff0;
          box-shadow: 0 0 20px rgba(0, 255, 240, 0.4);
          transform: translateY(-2px);
        }

        .btn-linkedin:hover {
          color: #0077b5;
          border-color: #0077b5;
          box-shadow: 0 0 20px rgba(0, 119, 181, 0.4);
          transform: translateY(-2px);
        }

        .btn:hover::before {
          left: 100%;
        }

        .icon {
          margin-right: 8px;
          width: 18px;
          height: 18px;
          fill: currentColor;
        }
      </style>

      <div class="container">
        <!-- Website / Portfolio Button -->
        <a class="btn btn-portfolio" href="https://nicohartmann.dev" target="_blank">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
          Visit Website
        </a>

        <!-- LinkedIn Button -->
        <a class="btn btn-linkedin" href="https://www.linkedin.com/in/nicohartmann-dev" target="_blank">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/>
          </svg>
          Connect LinkedIn
        </a>
      </div>
    </div>
  </foreignObject>
</svg>
