<svg width="800" height="60" viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TRACKS & CONNECTIONS -->
  <!-- Main Trunk Line (Center) -->
  <path d="M 0 30 L 800 30" stroke="#30363d" stroke-width="2"/>
  <path d="M 0 30 L 220 30 M 340 30 L 460 30 M 580 30 L 800 30" stroke="#8b949e" stroke-width="2"/>
  
  <!-- Upper Branch (Feature) -->
  <path d="M 220 30 Q 240 30 260 12 L 440 12 Q 460 30 480 30" stroke="#1f6feb" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Lower Branch (Experiment) -->
  <path d="M 340 30 Q 360 30 380 48 L 560 48 Q 580 30 600 30" stroke="#8957e5" stroke-width="2" stroke-linecap="round"/>

  <!-- COMMIT NODES (Ordered chronologically left-to-right) -->
  <!-- Main: Base branch point -->
  <circle cx="220" cy="30" r="4.5" fill="#238636" stroke="#0d1117" stroke-width="2"/>
  
  <!-- Upper Feature Branch Commits -->
  <circle cx="290" cy="12" r="4" fill="#1f6feb" stroke="#0d1117" stroke-width="1.5"/>
  <circle cx="370" cy="12" r="4" fill="#1f6feb" stroke="#0d1117" stroke-width="1.5"/>
  
  <!-- Main: Midpoint / Second fork -->
  <circle cx="340" cy="30" r="4" fill="#8b949e" stroke="#0d1117" stroke-width="1.5"/>
  
  <!-- Lower Experimental Branch Commits -->
  <circle cx="420" cy="48" r="4" fill="#8957e5" stroke="#0d1117" stroke-width="1.5"/>
  
  <!-- Upper Feature Branch Merge Back -->
  <circle cx="480" cy="30" r="4.5" fill="#f85149" stroke="#0d1117" stroke-width="2"/>
  
  <!-- Lower Experimental Branch Second Commit -->
  <circle cx="500" cy="48" r="4" fill="#8957e5" stroke="#0d1117" stroke-width="1.5"/>
  
  <!-- Lower Experimental Merge Back -->
  <circle cx="600" cy="30" r="4.5" fill="#f85149" stroke="#0d1117" stroke-width="2"/>
</svg>
